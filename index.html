<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docs</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Marked.js para renderização de Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <!-- Highlight.js para syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css" id="hljs-theme-light">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" id="hljs-theme-dark" disabled>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/yaml.min.js"></script>
</head>
<body>

  <!-- ═══ HEADER ═══════════════════════════════════════════════════ -->
  <header class="app-header" id="app-header">
    <div class="header-left">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar" title="Alternar menu">
        <span class="hamburger"></span>
      </button>
      <div class="brand">
        <span class="brand-icon">📋</span>
        <div class="brand-text">
          <span class="brand-name" id="system-name">Carregando…</span>
          <span class="brand-sub">Documentação</span>
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <input type="text" id="search-input" class="search-input" placeholder="Buscar arquivo…" autocomplete="off">
        <span class="search-icon">🔍</span>
        <div class="search-results" id="search-results"></div>
      </div>
      <a class="header-btn" id="github-link" href="#" target="_blank" title="Abrir no GitHub">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.49.5.09.682-.217.682-.482 0-.237-.009-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.03-2.683-.104-.253-.448-1.27.098-2.647 0 0 .84-.268 2.75 1.026A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.026 2.747-1.026.548 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.337 4.687-4.565 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
      </a>
      <button class="theme-btn" id="theme-btn" title="Alternar tema">🌙</button>
    </div>
  </header>

  <!-- ═══ LAYOUT ════════════════════════════════════════════════════ -->
  <div class="app-layout">

    <!-- ─── SIDEBAR ──────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-section-title">ESTRUTURA</div>
        <nav class="tree" id="file-tree">
          <div class="tree-loading">
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
            <div class="skeleton-line"></div>
          </div>
        </nav>
      </div>
    </aside>

    <!-- ─── SIDEBAR OVERLAY (mobile) ─────────────────────────────── -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- ─── CONTENT ──────────────────────────────────────────────── -->
    <main class="content-area" id="content-area">
      <div class="content-inner" id="content-inner">
        <!-- Welcome screen -->
        <div class="welcome" id="welcome-screen">
          <div class="welcome-icon">📚</div>
          <h1 class="welcome-title" id="welcome-title">Carregando…</h1>
          <p class="welcome-subtitle">Selecione um arquivo no menu lateral para visualizar seu conteúdo.</p>
          <div class="welcome-stats" id="welcome-stats"></div>
        </div>
      </div>
    </main>

  </div>

  <!-- ═══ PROTOTYPE MODAL ══════════════════════════════════════════ -->
  <div class="proto-modal" id="proto-modal">
    <div class="proto-modal-header">
      <span id="proto-modal-title">Protótipo</span>
      <div style="display:flex;gap:8px;align-items:center">
        <a id="proto-open-link" href="#" target="_blank" class="proto-open-btn">↗ Abrir</a>
        <button class="proto-close-btn" onclick="closeProto()">✕</button>
      </div>
    </div>
    <iframe id="proto-frame" src="about:blank" frameborder="0"></iframe>
  </div>
  <div class="proto-backdrop" id="proto-backdrop" onclick="closeProto()"></div>

  <script src="script.js"></script>
</body>
</html>
