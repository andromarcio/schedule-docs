<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc Template</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-theme">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo-section">
                <button class="menu-toggle" id="menuToggle" aria-label="Menu">
                    <i class="fas fa-bars"></i>
                </button>
                <span class="logo">Doc Template</span>
            </div>
            <div class="header-actions">
                <a href="https://github.com/andromarcio/doc-template" class="btn-github" target="_blank" rel="noopener">
                    <i class="fab fa-github"></i> GitHub
                </a>
                <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="layout">
        <!-- Sidebar: file tree -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title"><i class="fas fa-folder-tree"></i> Repositório</span>
                <button class="sidebar-close" id="sidebarClose" aria-label="Fechar menu">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="tree-container" id="treeContainer">
                <div class="tree-loading">
                    <i class="fas fa-spinner fa-spin"></i> Carregando...
                </div>
            </div>
        </aside>

        <!-- Main content: file viewer -->
        <main class="main-content" id="mainContent">
            <div class="welcome" id="welcome">
                <div class="welcome-icon"><i class="fas fa-book-open"></i></div>
                <h1>Doc Template</h1>
                <p>Selecione um arquivo na árvore à esquerda para visualizar seu conteúdo.</p>
            </div>
            <article class="file-viewer" id="fileViewer" style="display:none;">
                <nav class="breadcrumb" id="breadcrumb"></nav>
                <div class="markdown-body" id="markdownBody"></div>
            </article>
        </main>
    </div>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="./script.js"></script>
</body>
</html>
